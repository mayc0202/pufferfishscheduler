server:
  port: 8082
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: pufferfishscheduler-ai # 应用名称
  main:
    allow-circular-references: false  # 允许循环依赖
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.redis.autoconfigure.RedisVectorStoreAutoConfiguration

  # datasource
  datasource:
    # mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://81.69.250.183:3306/pufferfish-ai?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Etl2025
    # HikariCP > Druid
    hikari:
      pool-name: mysql-hikari
      connection-timeout: 30000           # 获取连接的超时时间（毫秒）
      validation-timeout: 5000            # 控制将测试连接的活动性的最长时间
      idle-timeout: 300000                # 空闲连接被回收前的最大空闲时间（毫秒），应小于数据库的wait_timeout参数
      max-lifetime: 1800000               # 连接的最大存活时间（毫秒），应小于数据库的interactive_timeout参数
      maximum-pool-size: 100              # 连接池中允许的最大连接数，通常设置为 (CPU核心数 * 2) + 磁盘数 的倍数
      minimum-idle: 5                     # 连接池中保持的最小空闲连接数
      leak-detection-threshold: 60000     # 检测连接泄露的阈值（毫秒）
      connection-test-query: SELECT 1     # MySQL连接测试查询

  data:
    # Redis
    redis:
      host: 81.69.250.183
      port: 6379
      password: Etl2025
      database: 0 # 数据库默认索引为0
      lettuce:
        pool:
          max-active: 50        # 增大连接池
          max-idle: 20          # 最大空闲连接
          min-idle: 5           # 最小空闲连接
          max-wait: 3000ms      # 获取连接最大等待时间
        shutdown-timeout: 200ms # 关闭超时时间
      timeout: 30000ms          # 命令超时时间(30秒)

  # AI
  ai:
    # 阿里云大模型平台
    dashscope:
      # 读取超时（毫秒）
      read-timeout: 60000
      #      api-key: ${AI_DASHSCOPE_API_KEY} # 环境变量里配置的app-key
      api-key: sk-e8657a7c1ff84c80b3080735858c2621
      chat:
        enabled: true # 如果不使用聊天功能可以关闭
        options:
          model: qwen-plus # 模型名称
          temperature: 0.7 # 控制生成文本的随机性
          top-p: 0.9 # 用于控制采样的多样性
          top-k: 40

      # embedding嵌入模型
      embedding:
        enabled: true
        options:
          model: text-embedding-v3 # 嵌入模型
          dimensions: 1024 # 嵌入向量的维度

    #    mcp:
    #      client:
    #        sse:
    #          connections:
    #            fetcher-server:
    #              url: http://localhost:3000 # fetcher服务

    # 向量存储配置
    vectorstore:
      redis:
        initialize-schema: true # 启动时自动创建Redis向量索引结构（首次部署需开启）
        index-name: custom-index # Redis键名前缀，用于区分不同应用的向量数据
        prefix: custom-prefix  # Redis向量索引名称

# Dubbo 服务
dubbo:
  application:
    name: pufferfishscheduler-ai
  protocol:
    name: dubbo
    port: 20882
  registry:
    address: nacos://localhost:8848

# 安全配置
security:
  # AES密钥
  aes:
    key: 1q2w3e4r5t6ymayc
  # RSA公钥
  rsa:
    public-key: 
    private-key: 

# mybatis-plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml # 扫描XML映射文件
  type-aliases-package: com.pufferfish.ai.dao.entity # 实体类别名包
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰
    default-executor-type: REUSE  # 使用REUSE执行器
    cache-enabled: false          # 如果不是必须，关闭二级缓存
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl #mybatis-plus日志实现类
  global-config:
    db-config:
      id-type: auto #主键自增
      table-prefix: #数据表前缀
      update-strategy: not_empty #配置mybatis-plus
      logic-delete-field: deleted # 逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0

# log日志
logging:
  level:
    web: info #扫描web
    com.zaxxer.hikari: info
    org.springframework.ai.chat.client.advisor: debug
    org.springframework.ai: debug
    com.pufferfish.ai: debug
    org.apache.dubbo: DEBUG
    com.alibaba.nacos: DEBUG
  pattern:
    console: "%d %clr(%5p) ---- [%t] %clr(%-40.40c){cyan} : %m %n"
