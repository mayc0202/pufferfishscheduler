server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    context-path: /pufferfishscheduler
  port: 8081

# 应用配置
app:
  #是否为开发模式，默认true
  dev-mode:
    enabled: false
  # 是否发送预警邮件，默认false
  send-alert-email:
    enabled: true

spring:
  messages:
    encoding: UTF-8
  main:
    allow-circular-references: true # 开启循环依赖
  application:
    name: pufferfishscheduler
  # Springdoc OpenAPI 配置
  doc:
    api-docs:
      enabled: true
      path: /api-docs
    swagger-ui:
      enabled: true
      path: /swagger-ui.html
      operations-sorter: method
      tags-sorter: alpha
      display-request-duration: true
      try-it-out-enabled: true
      filter: true

  servlet:
    multipart: # 限制上传的文件最大值
      max-request-size: 512MB
      max-file-size: 512MB
  mail:
    host: smtp.qq.com
    username: 203373485@qq.com # 发件人
    password: fsfvylegjvaacaii # 授权码
    port: 587
    default-encoding: UTF-8 # 字符编码
    properties:
      mail:
        smtp:
          auth: true
          # QQ 邮箱 587：必须先 STARTTLS 再认证，否则会 530（要求安全连接）
          starttls:
            enable: true
            required: true
        debug: true
  # 数据源
  datasource:
    # mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://81.69.250.183:3306/pufferfishscheduler?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Etl2025
    # HikariCP连接池 性能 > Druid，专为高性能优化，号称"零开销"连接池
    hikari:
      pool-name: mysql-hikari
      connection-timeout: 30000           # 获取连接的超时时间（毫秒）
      validation-timeout: 5000            # 控制将测试连接的活动性的最长时间
      idle-timeout: 300000                # 空闲连接被回收前的最大空闲时间（毫秒），应小于数据库的wait_timeout参数
      max-lifetime: 1800000               # 连接的最大存活时间（毫秒），应小于数据库的interactive_timeout参数
      maximum-pool-size: 100              # 连接池中允许的最大连接数，通常设置为 (CPU核心数 * 2) + 磁盘数 的倍数
      minimum-idle: 5                     # 连接池中保持的最小空闲连接数
      leak-detection-threshold: 60000     # 检测连接泄露的阈值（毫秒）
      connection-test-query: SELECT 1     # MySQL连接测试查询

  # 配置redis
  redis:
    host: 81.69.250.183
    port: 6379
    password: Etl2025
    database: 0 # 数据库默认索引为0
    timeout: 30000ms            # 命令超时时间(30秒)
    lettuce:
      shutdown-timeout: 200ms   # 关闭超时时间
      pool:
        max-active: 100         # 连接池中允许的最大连接数，通常设置为 (CPU核心数 * 2) + 磁盘数 的倍数
        max-idle: 10            # 连接池中保持的最大空闲连接数
        min-idle: 2             # 连接池中保持的最小空闲连接数
        max-wait: 3000ms        # 连接池耗尽时，获取连接的最大等待时间

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher  # 兼容Swagger的路径匹配策略

# Dubbo配置
dubbo:
  metrics:
    enable-jvm: false
    enable-registry: false
    enable-metadata: false
    enable-rpc: false
  application:
    name: pufferfishscheduler
    qos-enable: false
    parameters: # 连接池配置
      connection-pool: true
      max-idle-per-key: 10
      min-idle-per-key: 2
      max-total: 100
  protocol:
    name: dubbo
    port: 20881
  consumer:
    check: false  # 关闭启动时检查
    timeout: 60000
    retries: 3 # 重试次数
  registry: # 注册中心配置
    check: false  # 注册中心启动时不检查
    protocol: zookeeper  # 明确协议类型
    address: 81.69.250.183:2181
    parameters:
      zookeeper.sasl.client: "false"

# 实时数据同步引擎配置
realtime:
  topic:
    # 主题数据复制数量
    replication.factor: 1
    # 主题分区数量(按照Kafka集群机器数量分配，提升并发写性能)
    partitions: 1
    # 主题压缩类型，可以节省网络带宽
    compression.type: snappy
    acks: 1
  consumer:
    # 每次拉取的记录数
    max.poll.records: 10000
    # 每次拉取的最大字节数(100MB)
    max.partition.fetch.bytes: 104857600
    # 每次最大获取的记录大小（50MB）
    fetch.min.bytes: 52428800
    # 消费端压缩算法
    compression.type: snappy
    fetch.max.wait.ms: 1000
  config:
    # 是否开启心跳
    heartbeat.enabled: false
    # 心跳间隔 默认3600000,也就是一小时
    heartbeat.interval.ms: 3600000
    # 时间精度 可选adaptive/connect，默认adaptive
    time.precision.mode: connect
    # 数值精度 可选adaptive/double/string，默认adaptive
    decimal.handling.mode: double
  stats:
    sync:
      fixed-delay-ms: 300000

# mybatis-plus配置
mybatis-plus:
  configuration:
    default-executor-type: REUSE  # 使用REUSE执行器
    cache-enabled: false          # 如果不是必须，关闭二级缓存
    #    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl #mybatis-plus日志实现类
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl # 完全禁用MyBatis日志
  global-config:
    db-config:
      id-type: auto #主键自增
      table-prefix: #数据表前缀
      update-strategy: not_empty #配置mybatis-plus
      logic-delete-field: deleted # 逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0

# log日志
logging:
  level:
    web: debug #扫描web
    com.pufferfishscheduler.common: debug
    com.pufferfishscheduler.master: debug
    com.zaxxer.hikari: debug
    org.apache.dubbo.spring.extension.SpringExtensionFactory: WARN
  pattern:
    console: "%d %clr(%5p) ---- [%t] %clr(%-40.40c){cyan} : %m %n"

# JWT配置
jwt:
  token-secret: upSPHSHJfiiWtP+WWOpUJ9Iza1Fq3J11nJv6SGgAz9pFAX61WIckr/pQuN6TL0LR # 密钥
  expiration-time: 3600000 # 过期时间 1小时 3600000 => 1 * 60 * 60 * 1000
  issuer: etl-ds # 令牌签发者

# 安全配置
security:
  # AES密钥
  aes:
    key: 1q2w3e4r5t6ymayc
  # RSA公钥
  rsa:
    public-key: 
    private-key: 
  # 拦截器
  interceptor:
    # 开启拦截
    enabled: true
    # 拦截路径
    exclude-paths:
      - /auth/login.do
      - /auth/getAuth.do
      - /auth/getUserInfo.do
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**
      - /v3/api-docs.yaml
      - /swagger-resources/**
      - /swagger-resources
      - /webjars/**
      - /doc.html

# 资源根路径
ftp:
  path: /data/ftp

# Kafka 任务调度（方案B：Master->Kafka->Worker）
kafka:
  brokers: 101.34.66.45:9092
  connector: 101.34.66.45:8083
  #  brokers: kafka-node:9092
  #  connector: kafka-node:8083
  dispatch:
    topic: pufferfishscheduler-task-dispatch # 任务派发主题
    acks: 1 # 等待所有分区副本确认
    retries: 3 # 重试次数，默认3

# 元数据定时调度（由 Master 计算并投递）
scheduler:
  # 元数据定时调度
  metadata:
    scan-interval-ms: 10000      # Master 扫描频率
    trigger-window-ms: 60000    # 触发窗口（<=1分钟内）
    stuck-threshold-ms: 300000  # Worker 异常导致 RUNNING/STARTING 长时间不回落时，Master 允许抢占恢复

# Worker Kafka 消费组（只影响 Worker）
worker-dispatch-consumer:
  group-id: pufferfishscheduler-worker-dispatch


